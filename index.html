<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SyncUp — Ticket Desk</title>
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root,[data-theme="light"]{
    --bg:#ffffff; --bg2:#fafafa; --panel:#ffffff;
    --ink:#09090b; --ink-soft:#3f3f46; --mut:#71717a;
    --line:#e4e4e7; --line2:#d4d4d8;
    --primary:#18181b; --primary-fg:#fafafa;
    --secondary:#f4f4f5; --secondary-fg:#18181b;
    --destructive:#ef4444; --destructive-fg:#fafafa;
    --accent:#f4f4f5; --accent-fg:#18181b;
    --muted:#f4f4f5; --muted-fg:#71717a;
    --ring:#a1a1aa;
    --radius:6px;
    --sev-high:#ef4444; --sev-medium:#f59e0b; --sev-low:#3b82f6;
  }
  [data-theme="dark"]{
    --bg:#09090b; --bg2:#18181b; --panel:#09090b;
    --ink:#fafafa; --ink-soft:#d4d4d8; --mut:#71717a;
    --line:#27272a; --line2:#3f3f46;
    --primary:#fafafa; --primary-fg:#18181b;
    --secondary:#27272a; --secondary-fg:#fafafa;
    --destructive:#ef4444; --destructive-fg:#fafafa;
    --accent:#27272a; --accent-fg:#fafafa;
    --muted:#27272a; --muted-fg:#a1a1aa;
    --ring:#52525b;
    --sev-high:#f87171; --sev-medium:#fbbf24; --sev-low:#60a5fa;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Geist',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;transition:background .15s,color .15s}
  .mono{font-family:'Geist Mono',monospace}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,textarea,select{font-family:inherit;font-size:14px}
  .focus-ring:focus-visible{outline:2px solid var(--ring);outline-offset:2px}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-family:'Geist Mono',monospace;font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;padding:10px 14px;font-weight:500;border-bottom:1px solid var(--line);white-space:nowrap}
  td{padding:12px 14px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:top}
  tr:hover td{background:var(--accent)}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

/* ------------------------------------------------------------------ *
 *  STORAGE LAYER
 * ------------------------------------------------------------------ */
// Hardcoded for testing — replace with proper Supabase project credentials in production
const supabase = window.supabase.createClient(
 "https://anuupbdmcqralxskdyur.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFudXVwYmRtY3FyYWx4c2tkeXVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1OTk5NzIsImV4cCI6MjA5NzE3NTk3Mn0.sMVeXZ6ofakKAJUF3sHTq9ku9RVn0NDv6d8pcryAr2M"
);

const api = {
  list:   async () => (await supabase.from("reports").select("*").order("created",{ascending:false})).data || [],
  add:    async (b) => {
    const { error } = await supabase.from("reports").insert(b);
    if (error) { alert("Supabase error: " + error.message); }
  },
  update: async (id, patch) => { await supabase.from("reports").update(patch).eq("id", id); },
  remove: async (id) => { await supabase.from("reports").delete().eq("id", id); },
  clear:  async () => { await supabase.from("reports").delete().neq("id", ""); },
};

/* ---------------- config ---------------- */
const ROLES = {
  tester:    { label:"Tester",    can:["report","verify","close","reopen"] },
  developer: { label:"Developer", can:["progress","resolve"] },
  admin:     { label:"Admin",     can:["report","verify","assign","progress","resolve","close","reopen","delete"] },
};

// Hardcoded for testing — replace with proper auth (e.g. Supabase Auth) in production
const USERS = {
  "tester@syncup.com": { pwd:"tester123", name:"Tom Bradley",  role:"tester" },
  "dev@syncup.com":    { pwd:"dev123",    name:"Dana Lin",     role:"developer" },
  "admin@syncup.com":  { pwd:"admin123",  name:"Alex Morgan",  role:"admin" },
};

const FLOW = ["reported","verified","assigned","in_progress","resolved","closed"];
const STATUS = {
  reported:   { label:"Reported" },
  verified:   { label:"Verified" },
  assigned:   { label:"Assigned" },
  in_progress:{ label:"In Progress" },
  resolved:   { label:"Resolved" },
  closed:     { label:"Closed" },
};
const SEV = { high:{l:"High",c:"var(--sev-high)"}, medium:{l:"Medium",c:"var(--sev-medium)"}, low:{l:"Low",c:"var(--sev-low)"} };
const MODULES = ["Landing","Dashboard","Settings","Jobs","Connections","Profile","App-wide","Other"];

/* ---------------- reusable components (shadcn-style) ---------------- */
function Btn({variant="default",size="default",children,style:sx,...rest}){
  const base = {fontFamily:"inherit",fontWeight:500,fontSize:14,borderRadius:"var(--radius)",cursor:"pointer",
    display:"inline-flex",alignItems:"center",justifyContent:"center",gap:6,transition:"all .12s",border:"none",whiteSpace:"nowrap"};
  const sizes = {default:{padding:"8px 16px",fontSize:14},sm:{padding:"6px 12px",fontSize:13},xs:{padding:"4px 10px",fontSize:12}};
  const variants = {
    default:{background:"var(--primary)",color:"var(--primary-fg)"},
    outline:{background:"transparent",color:"var(--ink)",border:"1px solid var(--line2)"},
    ghost:{background:"transparent",color:"var(--ink)"},
    destructive:{background:"var(--destructive)",color:"var(--destructive-fg)"},
    secondary:{background:"var(--secondary)",color:"var(--secondary-fg)"},
  };
  return <button {...rest} style={{...base,...sizes[size]||sizes.default,...variants[variant]||variants.default,...sx}}>{children}</button>;
}

function Badge({variant="default",children,style:sx}){
  const base = {fontFamily:"'Geist Mono',monospace",fontSize:11,fontWeight:500,padding:"2px 8px",borderRadius:"var(--radius)",
    display:"inline-flex",alignItems:"center",gap:5,whiteSpace:"nowrap"};
  const variants = {
    default:{background:"var(--primary)",color:"var(--primary-fg)"},
    outline:{background:"transparent",color:"var(--ink)",border:"1px solid var(--line2)"},
    secondary:{background:"var(--secondary)",color:"var(--secondary-fg)"},
  };
  return <span style={{...base,...variants[variant]||variants.default,...sx}}>{children}</span>;
}

function Card({children,style:sx,...rest}){
  return <div {...rest} style={{background:"var(--panel)",border:"1px solid var(--line)",borderRadius:"var(--radius)",...sx}}>{children}</div>;
}

function Overlay({children,onClose}){
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"grid",placeItems:"center",zIndex:100,padding:16}}>
      <Card onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:520,padding:"24px",maxHeight:"90vh",overflow:"auto"}}>{children}</Card>
    </div>
  );
}

function Toast({msg}){
  return (
    <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",
      background:"var(--primary)",color:"var(--primary-fg)",padding:"12px 20px",borderRadius:"var(--radius)",
      fontSize:14,fontWeight:500,boxShadow:"0 4px 12px rgba(0,0,0,.15)",maxWidth:"90vw",zIndex:200}}>{msg}</div>
  );
}

function Separator(){
  return <div style={{height:1,background:"var(--line)",margin:"16px 0"}}/>;
}

function StatusBadge({s}){
  return <Badge variant="outline">{STATUS[s].label}</Badge>;
}

function ThemeToggle(){
  const [dark,setDark]=useState(document.documentElement.getAttribute("data-theme")==="dark");
  const toggle=()=>{const next=!dark;setDark(next);document.documentElement.setAttribute("data-theme",next?"dark":"light");};
  return <Btn variant="ghost" size="sm" onClick={toggle} style={{fontSize:16,padding:"6px 10px"}}>{dark?"☀":"☾"}</Btn>;
}

/* ---------- STAFF LOGIN MODAL ---------- */
function StaffLoginModal({onLogin,onClose}){
  const [email,setEmail]=useState("");
  const [pwd,setPwd]=useState("");
  const [err,setErr]=useState("");
  const attempt=()=>{
    const u=USERS[email.trim().toLowerCase()];
    if(!u){setErr("Unknown email");return;}
    if(u.pwd!==pwd){setErr("Wrong password");return;}
    onLogin({name:u.name,role:u.role});
  };
  return (
    <Overlay onClose={onClose}>
      <div style={{fontSize:18,fontWeight:600,marginBottom:4}}>Staff Sign In</div>
      <div style={{fontSize:13,color:"var(--mut)",marginBottom:20}}>Tester, developer, and admin accounts only.</div>
      <div style={{marginBottom:12}}>
        <div className="mono" style={{fontSize:11,color:"var(--mut)",marginBottom:6,textTransform:"uppercase",letterSpacing:.5}}>Email</div>
        <input className="focus-ring" value={email} onChange={e=>setEmail(e.target.value)}
          style={{width:"100%",padding:"10px 12px",border:"1px solid var(--line2)",borderRadius:"var(--radius)",background:"var(--bg)",color:"var(--ink)"}}/>
      </div>
      <div style={{marginBottom:16}}>
        <div className="mono" style={{fontSize:11,color:"var(--mut)",marginBottom:6,textTransform:"uppercase",letterSpacing:.5}}>Password</div>
        <input className="focus-ring" type="password" value={pwd} onChange={e=>setPwd(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter")attempt();}}
          style={{width:"100%",padding:"10px 12px",border:"1px solid var(--line2)",borderRadius:"var(--radius)",background:"var(--bg)",color:"var(--ink)"}}/>
      </div>
      {err && <div style={{fontSize:13,color:"var(--destructive)",marginBottom:12}}>{err}</div>}
      <Btn onClick={attempt} style={{width:"100%"}}>Sign In</Btn>
    </Overlay>
  );
}

/* ---------- TICKET FORM MODAL ---------- */
function TicketFormModal({onSubmit,onClose}){
  const [f,setF]=useState({type:"bug",title:"",desc:"",module:"Settings",severity:"medium",email:"",shot:null});
  const set=(k,v)=>setF(s=>({...s,[k]:v}));
  const pick=(e)=>{const file=e.target.files[0]; if(!file)return;
    const r=new FileReader(); r.onload=()=>set("shot",r.result); r.readAsDataURL(file);};
  const ok = f.title.trim() && f.desc.trim() && f.email.trim();
  const isBug = f.type==="bug";
  const labelStyle = {fontFamily:"'Geist Mono',monospace",fontSize:11,color:"var(--mut)",textTransform:"uppercase",letterSpacing:.5,marginBottom:6};
  const inputStyle = {width:"100%",padding:"10px 12px",border:"1px solid var(--line2)",borderRadius:"var(--radius)",marginBottom:14,color:"var(--ink)",background:"var(--bg)"};
  return (
    <Overlay onClose={onClose}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
        <div>
          <div style={{fontSize:18,fontWeight:600}}>New ticket</div>
          <div style={{fontSize:13,color:"var(--mut)",marginTop:4}}>No account needed.</div>
        </div>
        <Btn variant="ghost" size="xs" onClick={onClose} style={{fontSize:18}}>×</Btn>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:18}}>
        {[["bug","Bug"],["feature","Feature"]].map(([t,lbl])=>(
          <Btn key={t} variant={f.type===t?"default":"outline"} size="sm" onClick={()=>set("type",t)} style={{flex:1}}>{lbl}</Btn>
        ))}
      </div>
      <div style={labelStyle}>Title</div>
      <input className="focus-ring" value={f.title} onChange={e=>set("title",e.target.value)} style={inputStyle}/>
      <div style={labelStyle}>Description</div>
      <textarea className="focus-ring" value={f.desc} onChange={e=>set("desc",e.target.value)} rows={4} style={{...inputStyle,resize:"vertical"}}/>
      <div style={{display:"flex",gap:12}}>
        <div style={{flex:1}}>
          <div style={labelStyle}>Module</div>
          <select className="focus-ring" value={f.module} onChange={e=>set("module",e.target.value)} style={{...inputStyle,background:"var(--bg)"}}>
            {MODULES.map(m=><option key={m}>{m}</option>)}
          </select>
        </div>
        {isBug && (
          <div style={{flex:1}}>
            <div style={labelStyle}>Severity</div>
            <select className="focus-ring" value={f.severity} onChange={e=>set("severity",e.target.value)} style={{...inputStyle,background:"var(--bg)"}}>
              {Object.entries(SEV).map(([k,v])=><option key={k} value={k}>{v.l}</option>)}
            </select>
          </div>
        )}
      </div>
      <div style={labelStyle}>Your email</div>
      <input className="focus-ring" value={f.email} onChange={e=>set("email",e.target.value)} style={inputStyle}/>
      <div style={labelStyle}>Screenshot (optional)</div>
      <input className="focus-ring" type="file" accept="image/*" onChange={pick} style={{fontSize:13,marginBottom:6}}/>
      {f.shot && <img src={f.shot} alt="preview" style={{maxWidth:"100%",borderRadius:"var(--radius)",border:"1px solid var(--line)",marginTop:8}}/>}
      <Btn disabled={!ok} onClick={()=>onSubmit({...f,severity:isBug?f.severity:"medium"})} style={{width:"100%",marginTop:20,opacity:ok?1:.5}}>Submit ticket</Btn>
    </Overlay>
  );
}

/* ---------- REPORTER VIEW (public, read-only) ---------- */
function ReporterView({bugs,onNewTicket}){
  const active = bugs.filter(b=>b.status!=="closed");
  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      <header style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 24px",borderBottom:"1px solid var(--line)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,borderRadius:"var(--radius)",background:"var(--primary)",color:"var(--primary-fg)",
            display:"grid",placeItems:"center",fontWeight:700,fontSize:15}}>S</div>
          <span style={{fontWeight:600,fontSize:16}}>SyncUp Ticket Desk</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <ThemeToggle/>
          <Btn variant="outline" size="sm" onClick={()=>document.getElementById("staff-login-trigger").click()}>Staff</Btn>
        </div>
      </header>
      <main style={{flex:1,padding:"32px 24px",maxWidth:960,margin:"0 auto",width:"100%"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <div>
            <h1 style={{fontSize:24,fontWeight:600}}>Active Tickets</h1>
            <p style={{fontSize:13,color:"var(--mut)",marginTop:4}}>{active.length} open {active.length===1?"ticket":"tickets"}</p>
          </div>
          <Btn onClick={onNewTicket}>New ticket</Btn>
        </div>
        <Card>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Description</th>
                <th>Module</th>
              </tr>
            </thead>
            <tbody>
              {active.length===0
                ? <tr><td colSpan={4} style={{textAlign:"center",padding:"40px",color:"var(--mut)"}}>No active tickets.</td></tr>
                : active.map(b=>(
                    <tr key={b.id}>
                      <td className="mono" style={{fontSize:12,color:"var(--mut)",whiteSpace:"nowrap"}}>{b.id}</td>
                      <td style={{fontWeight:500}}>{b.title}</td>
                      <td style={{fontSize:13,color:"var(--ink-soft)",maxWidth:220,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{b.desc}</td>
                      <td className="mono" style={{fontSize:12,color:"var(--mut)"}}>{b.module}</td>
                    </tr>
                  ))
              }
            </tbody>
          </table>
        </Card>
      </main>
    </div>
  );
}

/* ---------- TICKET ROW (staff view) ---------- */
function TicketRow({b,me,onAct,onDelete,expanded,onToggle}){
  const overdue = b.due && b.status!=="resolved" && b.status!=="closed" && new Date(b.due) < new Date();
  const can = ROLES[me.role].can;
  const isBug = b.type==="bug";
  return (
    <>
      <tr onClick={onToggle} style={{cursor:"pointer"}}>
        <td className="mono" style={{fontSize:12,color:"var(--mut)",whiteSpace:"nowrap"}}>{b.id}</td>
        <td><StatusBadge s={b.status}/></td>
        <td style={{fontWeight:500}}>
          <span style={{display:"inline-flex",alignItems:"center",gap:6}}>
            {!isBug && <Badge variant="secondary" style={{fontSize:10}}>Feature</Badge>}
            {b.title}
            {overdue && <Badge variant="default" style={{background:"var(--destructive)",color:"var(--destructive-fg)",fontSize:10}}>overdue</Badge>}
          </span>
        </td>
        <td className="mono" style={{fontSize:12,color:"var(--mut)"}}>{b.module}</td>
        {isBug && <td><span style={{width:8,height:8,borderRadius:8,background:SEV[b.severity]?.c||"var(--mut)",display:"inline-block"}} title={SEV[b.severity]?.l}/></td>}
        {!isBug && <td/>}
        <td style={{fontSize:16,color:"var(--mut)",transition:"transform .15s",transform:expanded?"rotate(90deg)":"none",textAlign:"center",width:40}}>›</td>
      </tr>
      {expanded && (
        <tr>
          <td colSpan={6} style={{padding:"12px 16px 20px",background:"var(--muted)"}}>
            <div style={{display:"flex",gap:16,fontSize:12,color:"var(--ink-soft)",flexWrap:"wrap",marginBottom:12}}>
              <span>Reporter: {b.reporter}</span>
              {b.assignee && b.assignee!=="—" && <span>Assigned: {b.assignee}</span>}
              {b.due && <span>Due: {b.due}</span>}
              {isBug && <span>Severity: {SEV[b.severity]?.l||b.severity}</span>}
            </div>
            <p style={{fontSize:14,lineHeight:1.6,color:"var(--ink)",marginBottom:b.shot?12:0,maxWidth:680}}>{b.desc}</p>
            {b.shot && <img src={b.shot} alt="" style={{maxWidth:"100%",borderRadius:"var(--radius)",border:"1px solid var(--line)",marginTop:8}}/>}
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:14}}>
              {can.includes("verify") && b.status==="reported" &&
                <Btn variant="outline" size="xs" onClick={e=>{e.stopPropagation();onAct(b.id,{status:"verified"})}}>Verify</Btn>}
              {can.includes("assign") && b.status==="verified" &&
                <Btn variant="outline" size="xs" onClick={e=>{e.stopPropagation();const who=prompt("Assign to developer (name):"); if(who){const dd=new Date();dd.setDate(dd.getDate()+7);const due=prompt("Timeline / due date (YYYY-MM-DD):",dd.toISOString().slice(0,10)); onAct(b.id,{status:"assigned",assignee:"dev:"+who,due:due||""});}}}>Assign</Btn>}
              {can.includes("progress") && b.status==="assigned" &&
                <Btn variant="outline" size="xs" onClick={e=>{e.stopPropagation();onAct(b.id,{status:"in_progress"})}}>Start work</Btn>}
              {can.includes("resolve") && (b.status==="in_progress"||b.status==="assigned") &&
                <Btn variant="outline" size="xs" onClick={e=>{e.stopPropagation();onAct(b.id,{status:"resolved"})}}>Resolve</Btn>}
              {can.includes("close") && b.status==="resolved" &&
                <Btn variant="outline" size="xs" onClick={e=>{e.stopPropagation();onAct(b.id,{status:"closed"})}}>Close</Btn>}
              {can.includes("reopen") && (b.status==="resolved"||b.status==="closed") &&
                <Btn variant="destructive" size="xs" onClick={e=>{e.stopPropagation();onAct(b.id,{status:"reported",assignee:"—",due:""})}}>Reopen</Btn>}
              {can.includes("delete") &&
                <Btn variant="destructive" size="xs" onClick={e=>{e.stopPropagation();if(confirm("Delete "+b.id+" permanently?")) onDelete(b.id);}}>Delete</Btn>}
            </div>
            {b.status==="resolved" &&
              <div style={{marginTop:12,fontSize:12,color:"var(--ink-soft)",background:"var(--muted)",padding:"8px 12px",borderRadius:"var(--radius)",maxWidth:680}}>
                Notification queued to {b.reporter.replace("guest:","")}: "Your ticket has been resolved."
              </div>}
            {overdue &&
              <div style={{marginTop:12,fontSize:12,color:"var(--destructive)",background:"var(--muted)",padding:"8px 12px",borderRadius:"var(--radius)",maxWidth:680}}>
                Past its timeline — admin and tester would be notified.
              </div>}
          </td>
        </tr>
      )}
    </>
  );
}

/* ---------- APP ---------- */
function App(){
  const [bugs,setBugs]=useState([]);
  const [me,setMe]=useState(null);
  const [showForm,setShowForm]=useState(false);
  const [showLogin,setShowLogin]=useState(false);
  const [filter,setFilter]=useState("all");
  const [q,setQ]=useState("");
  const [toast,setToast]=useState(null);
  const [openId,setOpenId]=useState(null);

  const load=async()=>setBugs(await api.list());
  useEffect(()=>{load();},[]);

  const submit=async(f)=>{
    const prefix = f.type==="feature"?"FEAT-":"BUG-";
    // Hardcoded for testing — replace with proper ID generation in production
    const n = 1045 + bugs.filter(b=>b.id.startsWith(prefix)).length;
    const b={ id:prefix+n, type:f.type, title:f.title.trim(), desc:f.desc.trim(),
      module:f.module, severity:f.severity, status:"reported", reporter:"guest:"+f.email.trim(),
      assignee:"—", due:"", created:new Date().toISOString().slice(0,10), shot:f.shot };
    await api.add(b); await load(); setShowForm(false);
    setToast("Ticket submitted — we'll email "+f.email.trim()+" on resolution.");
    setTimeout(()=>setToast(null),4200);
  };

  const act = async (id, patch) => {
    await api.update(id, patch);
    await load();
    if (patch.status) {
      setToast("Updated " + id + " → " + STATUS[patch.status].label);
      setTimeout(() => setToast(null), 2600);
    }
    if(patch.status === "resolved") {
      const targetBug = bugs.find(b => b.id === id);
      const reporterEmail = targetBug.reporter.replace("guest:", "");
      // Hardcoded for testing — replace with proper notification endpoint in production
      await fetch("https://anuupbdmcqralxskdyur.supabase.co/functions/v1/notify-resolved-md", {
        method: "POST",
        body: JSON.stringify({ email: reporterEmail, reportId: targetBug.id, title: targetBug.title }),
      });
    }
  };

  const del = async (id) => { await api.remove(id); await load();
    setToast("Deleted "+id); setTimeout(()=>setToast(null),2400); };
  const clearAll = async () => { if(!confirm("Delete ALL tickets permanently?")) return;
    await api.clear(); await load(); setToast("All tickets cleared"); setTimeout(()=>setToast(null),2600); };

  /* --- Reporter (not logged in) --- */
  if(!me){
    return (
      <>
        <ReporterView bugs={bugs} onNewTicket={()=>setShowForm(true)}/>
        <button id="staff-login-trigger" style={{display:"none"}} onClick={()=>setShowLogin(true)}/>
        {showLogin && <StaffLoginModal onLogin={u=>{setMe(u);setShowLogin(false);}} onClose={()=>setShowLogin(false)}/>}
        {showForm && <TicketFormModal onSubmit={submit} onClose={()=>setShowForm(false)}/>}
        {toast && <Toast msg={toast}/>}
      </>
    );
  }

  /* --- Staff (logged in) --- */
  const counts = FLOW.reduce((a,s)=>{a[s]=bugs.filter(b=>b.status===s).length;return a;},{});
  const openCount = bugs.filter(b=>b.status!=="resolved"&&b.status!=="closed").length;
  const shown = bugs.filter(b=>{
    const mf = filter==="all"||b.status===filter;
    const mq = !q || (b.title+b.desc+b.id+b.module).toLowerCase().includes(q.toLowerCase());
    return mf&&mq;
  });

  return (
    <div style={{display:"flex",minHeight:"100vh"}}>
      {/* SIDEBAR */}
      <aside style={{width:240,background:"var(--bg2)",borderRight:"1px solid var(--line)",
        padding:"20px 14px",display:"flex",flexDirection:"column",gap:4,position:"sticky",top:0,height:"100vh"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"0 6px 16px"}}>
          <div style={{width:32,height:32,borderRadius:"var(--radius)",background:"var(--primary)",color:"var(--primary-fg)",
            display:"grid",placeItems:"center",fontWeight:700,fontSize:15}}>S</div>
          <div style={{lineHeight:1.2}}>
            <div style={{fontSize:15,fontWeight:600}}>Ticket Desk</div>
            <div className="mono" style={{fontSize:10,color:"var(--mut)",letterSpacing:.3}}>SyncUp</div>
          </div>
        </div>

        <Btn onClick={()=>setShowForm(true)} style={{marginBottom:12,width:"100%"}}>+ New ticket</Btn>

        <div className="mono" style={{fontSize:10,color:"var(--mut)",letterSpacing:.8,padding:"0 8px 4px",textTransform:"uppercase"}}>Queues</div>
        {[{key:"all",label:"All tickets",n:bugs.length},...FLOW.map(s=>({key:s,label:STATUS[s].label,n:counts[s]}))].map(item=>(
          <button key={item.key} className="focus-ring" onClick={()=>setFilter(item.key)}
            style={{display:"flex",alignItems:"center",width:"100%",padding:"8px 12px",borderRadius:"var(--radius)",
            background:filter===item.key?"var(--accent)":"transparent",
            color:filter===item.key?"var(--ink)":"var(--ink-soft)",fontWeight:filter===item.key?600:400,fontSize:13,textAlign:"left"}}>
            <span style={{flex:1}}>{item.label}</span>
            <span className="mono" style={{fontSize:11,color:"var(--mut)"}}>{item.n}</span>
          </button>
        ))}

        <div style={{marginTop:"auto",padding:"14px 10px 4px",borderTop:"1px solid var(--line)"}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"var(--ink-soft)",marginBottom:4}}>
            <span>Open</span><span className="mono" style={{fontWeight:600}}>{openCount}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"var(--ink-soft)"}}>
            <span>Resolved</span><span className="mono" style={{fontWeight:600}}>{counts.resolved+counts.closed}</span>
          </div>
        </div>
      </aside>

      {/* MAIN */}
      <div style={{flex:1,minWidth:0,display:"flex",flexDirection:"column"}}>
        <header style={{display:"flex",alignItems:"center",gap:12,padding:"12px 24px",borderBottom:"1px solid var(--line)",background:"var(--bg)",position:"sticky",top:0,zIndex:20}}>
          <div style={{position:"relative",flex:1,maxWidth:400}}>
            <input className="focus-ring" value={q} onChange={e=>setQ(e.target.value)}
              style={{width:"100%",padding:"8px 12px",border:"1px solid var(--line2)",borderRadius:"var(--radius)",background:"var(--bg)",color:"var(--ink)",fontSize:14}}/>
          </div>
          {me.role==="admin" && bugs.length>0 &&
            <Btn variant="destructive" size="sm" onClick={clearAll}>Clear all</Btn>}
          <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:10}}>
            <ThemeToggle/>
            <div style={{textAlign:"right",lineHeight:1.25}}>
              <div style={{fontSize:13,fontWeight:600}}>{me.name}</div>
              <div className="mono" style={{fontSize:10,color:"var(--mut)",textTransform:"uppercase",letterSpacing:.5}}>{ROLES[me.role].label}</div>
            </div>
            <Btn variant="outline" size="sm" onClick={()=>setMe(null)}>Sign out</Btn>
          </div>
        </header>

        <main style={{flex:1,overflow:"auto",padding:"24px"}}>
          <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:16}}>
            <h1 style={{fontSize:22,fontWeight:600}}>{filter==="all"?"All tickets":STATUS[filter].label}</h1>
            <span className="mono" style={{fontSize:12,color:"var(--mut)"}}>{shown.length} {shown.length===1?"ticket":"tickets"}</span>
          </div>
          <Card style={{overflowX:"auto"}}>
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Status</th>
                  <th>Title</th>
                  <th>Module</th>
                  <th>Sev</th>
                  <th style={{width:40}}/>
                </tr>
              </thead>
              <tbody>
                {shown.length===0
                  ? <tr><td colSpan={6} style={{textAlign:"center",padding:"40px",color:"var(--mut)"}}>No tickets in this queue.</td></tr>
                  : shown.map(b=>(
                      <TicketRow key={b.id} b={b} me={me} onAct={act} onDelete={del}
                        expanded={openId===b.id} onToggle={()=>setOpenId(openId===b.id?null:b.id)}/>
                    ))
                }
              </tbody>
            </table>
          </Card>
        </main>
      </div>

      {showForm && <TicketFormModal onSubmit={submit} onClose={()=>setShowForm(false)}/>}
      {toast && <Toast msg={toast}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
