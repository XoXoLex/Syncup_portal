<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root,[data-theme="light"]{
    --bg:#ffffff; --bg2:#fafafa; --panel:#ffffff;
    --ink:#09090b; --ink-soft:#3f3f46; --mut:#71717a;
    --line:#e4e4e7; --line2:#d4d4d8;
    --primary:#18181b; --primary-fg:#fafafa;
    --secondary:#f4f4f5; --secondary-fg:#18181b;
    --destructive:#18181b; --destructive-fg:#fafafa;
    --accent:#f4f4f5; --accent-fg:#18181b;
    --muted:#f4f4f5; --muted-fg:#71717a;
    --ring:#a1a1aa;
    --radius:6px;
    --sev-high:#18181b; --sev-medium:#71717a; --sev-low:#a1a1aa;
  }
  [data-theme="dark"]{
    --bg:#09090b; --bg2:#18181b; --panel:#09090b;
    --ink:#fafafa; --ink-soft:#d4d4d8; --mut:#71717a;
    --line:#27272a; --line2:#3f3f46;
    --primary:#fafafa; --primary-fg:#18181b;
    --secondary:#27272a; --secondary-fg:#fafafa;
    --destructive:#fafafa; --destructive-fg:#18181b;
    --accent:#27272a; --accent-fg:#fafafa;
    --muted:#27272a; --muted-fg:#a1a1aa;
    --ring:#52525b;
    --sev-high:#fafafa; --sev-medium:#a1a1aa; --sev-low:#71717a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Geist',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;transition:background .15s,color .15s}
  .mono{font-family:'Geist Mono',monospace}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,textarea,select{font-family:inherit;font-size:14px}
  .focus-ring:focus-visible{outline:2px solid var(--ring);outline-offset:2px}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-family:'Geist Mono',monospace;font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;padding:10px 14px;font-weight:500;border-bottom:1px solid var(--line);white-space:nowrap}
  td{padding:12px 14px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:top}
  tr:hover td{background:var(--accent)}
  /* media query for mobile support */
  @media (max-width: 768px) {
    aside { display: none !important; }
    .mobile-header-menu { display: flex !important; }
    .main-content { padding: 12px !important; }
    table th:nth-child(4), table td:nth-child(4),
    table th:nth-child(5), table td:nth-child(5) { display: none; }
  }
  .attachment-thumb {
    position: relative;
    display: inline-block;
    margin: 4px;
  }
  .attachment-thumb img, .attachment-thumb video {
    max-width: 120px;
    max-height: 80px;
    border-radius: var(--radius);
    border: 1px solid var(--line);
    object-fit: cover;
    display: block;
  }
  .attachment-thumb .remove-btn {
    position: absolute;
    top: -6px;
    right: -6px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--destructive);
    color: white;
    font-size: 11px;
    display: grid;
    place-items: center;
    cursor: pointer;
    line-height: 1;
  }
  .attachment-grid { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
</style>

/* safe JSON parse helper (used for attachments + comments) */
function safeParse(v, fallback){
  try { return v ? (typeof v === "string" ? JSON.parse(v) : v) : fallback; }
  catch(e){ return fallback; }
}

/* ------------------------------------------------------------------ *
 *  SHARED UI PRIMITIVES
 * ------------------------------------------------------------------ */
function Btn({variant="default",size="default",children,style:sx,...rest}){
  const base = {fontFamily:"inherit",fontWeight:500,fontSize:14,borderRadius:"var(--radius)",cursor:"pointer",
    display:"inline-flex",alignItems:"center",justifyContent:"center",gap:6,transition:"opacity .1s"};
  const variants = {
    default:{background:"var(--primary)",color:"var(--primary-fg)",padding:"8px 16px",border:"none"},
    outline:{background:"transparent",color:"var(--ink)",padding:"7px 15px",border:"1px solid var(--line2)"},
    ghost:{background:"transparent",color:"var(--ink-soft)",padding:"6px 10px",border:"none"},
    destructive:{background:"var(--destructive)",color:"var(--destructive-fg)",padding:"8px 16px",border:"none"},
  };
  const sizes = { default:{}, sm:{fontSize:12,padding:"5px 10px"}, xs:{fontSize:11,padding:"3px 8px"} };
  return <button style={{...base,...variants[variant],...sizes[size],...sx}} {...rest}>{children}</button>;
}

function Badge({variant="default",children,style:sx}){
  const base = {fontFamily:"'Geist Mono',monospace",fontSize:11,fontWeight:500,padding:"2px 8px",borderRadius:"var(--radius)",
    display:"inline-block"};
  const variants = { default:{background:"var(--secondary)",color:"var(--secondary-fg)"},
    outline:{background:"transparent",color:"var(--ink-soft)",border:"1px solid var(--line2)"} };
  return <span style={{...base,...variants[variant],...sx}}>{children}</span>;
}

function Card({children,style:sx,...rest}){
  return <div style={{background:"var(--panel)",border:"1px solid var(--line)",borderRadius:"var(--radius)",...sx}} {...rest}>{children}</div>;
}

function Overlay({children,onClose}){
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",zIndex:50,display:"grid",placeItems:"center",padding:16}}>
      <div onClick={e=>e.stopPropagation()}
        style={{background:"var(--panel)",borderRadius:"var(--radius)",border:"1px solid var(--line)",
        padding:24,width:"100%",maxWidth:540,maxHeight:"90vh",overflowY:"auto"}}>
        {children}
      </div>
    </div>
  );
}

function Toast({msg}){
  return <div style={{position:"fixed",bottom:24,right:24,background:"var(--primary)",color:"var(--primary-fg)",
    padding:"10px 18px",borderRadius:"var(--radius)",fontSize:13,fontWeight:500,zIndex:100,
    boxShadow:"0 4px 16px rgba(0,0,0,.18)"}}>{msg}</div>;
}

function Separator(){ return <div style={{height:1,background:"var(--line)",margin:"16px 0"}}/>; }

function StatusBadge({s}){
  const colors = { reported:"var(--mut)", verified:"var(--ink)", assigned:"var(--ink)",
    in_progress:"var(--ink)", resolved:"var(--ink-soft)", closed:"var(--mut)" };
  return <Badge style={{color:colors[s]||"var(--mut)",background:"transparent",border:`1px solid ${colors[s]||"var(--mut)"}`}}>{STATUS[s]?.label||s}</Badge>;
}

// Change 1: theme control uses the words "Dark mode" / "Light mode" instead of sun/moon icons
function ThemeToggle(){
  const [dark,setDark]=useState(document.documentElement.getAttribute("data-theme")==="dark");
  const toggle=()=>{const next=!dark;setDark(next);document.documentElement.setAttribute("data-theme",next?"dark":"light");};
  return <Btn variant="outline" size="sm" onClick={toggle} aria-label="Toggle theme">
    {dark ? "Light mode" : "Dark mode"}
  </Btn>;
}

/* ------------------------------------------------------------------ *
 *  ATTACHMENT HELPERS
 * ------------------------------------------------------------------ */
function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve({ name: file.name, type: file.type, data: r.result });
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

function AttachmentThumbnail({ att, onRemove }) {
  const isVideo = att.type && att.type.startsWith("video/");
  return (
    <div className="attachment-thumb">
      {isVideo
        ? <video src={att.data} controls style={{maxWidth:120,maxHeight:80,borderRadius:"var(--radius)",border:"1px solid var(--line)"}}/>
        : <img src={att.data} alt={att.name} style={{maxWidth:120,maxHeight:80,borderRadius:"var(--radius)",border:"1px solid var(--line)",objectFit:"cover"}}/>
      }
      {onRemove && <span className="remove-btn" onClick={onRemove}>×</span>}
    </div>
  );
}

// Change 9: clicking an attachment opens it full-size in a lightbox overlay
function AttachmentViewer({ attachments }) {
  const [open, setOpen] = useState(null); // index of attachment shown in lightbox
  if (!attachments || attachments.length === 0) return null;
  const cur = open !== null ? attachments[open] : null;
  const curIsVideo = cur && cur.type && cur.type.startsWith("video/");
  return (
    <>
      <div className="attachment-grid">
        {attachments.map((att, i) => {
          const isVideo = att.type && att.type.startsWith("video/");
          return (
            <div key={i} className="attachment-thumb" style={{cursor:"zoom-in"}}
              onClick={(e)=>{ e.stopPropagation(); setOpen(i); }}>
              {isVideo
                ? <video src={att.data} style={{maxWidth:120,maxHeight:80,borderRadius:"var(--radius)",border:"1px solid var(--line)",pointerEvents:"none"}}/>
                : <img src={att.data} alt={att.name} style={{maxWidth:120,maxHeight:80,borderRadius:"var(--radius)",border:"1px solid var(--line)",objectFit:"cover"}}/>
              }
            </div>
          );
        })}
      </div>
      {cur && (
        <div onClick={()=>setOpen(null)}
          style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:80,display:"grid",placeItems:"center",padding:24}}>
          <span style={{position:"absolute",top:16,right:20,color:"#fff",fontSize:28,cursor:"pointer",lineHeight:1}}
            onClick={(e)=>{e.stopPropagation();setOpen(null);}}>×</span>
          {curIsVideo
            ? <video src={cur.data} controls autoPlay onClick={e=>e.stopPropagation()}
                style={{maxWidth:"95vw",maxHeight:"90vh",borderRadius:"var(--radius)"}}/>
            : <img src={cur.data} alt={cur.name} onClick={e=>e.stopPropagation()}
                style={{maxWidth:"95vw",maxHeight:"90vh",objectFit:"contain",borderRadius:"var(--radius)"}}/>
          }
        </div>
      )}
    </>
  );
}

/* ------------------------------------------------------------------ *
 *  COMMENT BOX  (Change 4)
 * ------------------------------------------------------------------ */
function CommentBox({onAdd}){
  const [t,setT]=useState("");
  const submit=()=>{ if(!t.trim())return; onAdd(t.trim()); setT(""); };
  return (
    <div style={{display:"flex",gap:8,marginTop:8}} onClick={e=>e.stopPropagation()}>
      <input className="focus-ring" value={t} onChange={e=>setT(e.target.value)}
        onKeyDown={e=>{ if(e.key==="Enter") submit(); }}
        placeholder="Add a comment…"
        style={{flex:1,padding:"7px 10px",border:"1px solid var(--line2)",borderRadius:"var(--radius)",background:"var(--bg)",color:"var(--ink)",fontSize:13}}/>
      <Btn size="sm" onClick={e=>{e.stopPropagation();submit();}}>Add</Btn>
    </div>
  );
}

/* ------------------------------------------------------------------ *
 *  LOGIN MODAL
 * ------------------------------------------------------------------ */
function StaffLoginModal({onLogin,onClose}){
  const [email,setEmail]=useState("");
  const [pwd,setPwd]=useState("");
  const [err,setErr]=useState("");
  const attempt=()=>{
    const u=USERS[email.trim().toLowerCase()];
    if(!u||u.pwd!==pwd){ setErr("Invalid email or password."); return; }
    onLogin(u);
  };
  const inp={width:"100%",padding:"10px 12px",border:"1px solid var(--line2)",borderRadius:"var(--radius)",
    marginBottom:12,color:"var(--ink)",background:"var(--bg)",fontSize:14};
  return (
    <Overlay onClose={onClose}>
      <div style={{fontSize:18,fontWeight:600,marginBottom:4}}>Staff sign-in</div>
      <div style={{fontSize:13,color:"var(--mut)",marginBottom:20}}>For SyncUp team members only.</div>
      <input className="focus-ring" placeholder="Email" value={email} onChange={e=>{setEmail(e.target.value);setErr("");}} style={inp}/>
      <input className="focus-ring" type="password" placeholder="Password" value={pwd}
        onChange={e=>{setPwd(e.target.value);setErr("");}}
        onKeyDown={e=>e.key==="Enter"&&attempt()} style={inp}/>
      {err && <div style={{color:"var(--destructive)",fontSize:13,marginBottom:10}}>{err}</div>}
      <Btn onClick={attempt} style={{width:"100%"}}>Sign in</Btn>
    </Overlay>
  );
}

/* ------------------------------------------------------------------ *
 *  TICKET FORM MODAL  (multiple screenshots + video)
 * ------------------------------------------------------------------ */
function TicketFormModal({onSubmit,onClose}){
  const [f,setF]=useState({type:"bug",title:"",desc:"",module:"Settings",severity:"medium",email:"",attachments:[]});
  const set=(k,v)=>setF(s=>({...s,[k]:v}));
  const isBug = f.type==="bug";
  const ok = f.title.trim() && f.desc.trim() && f.email.trim();

  const handleFiles = async (e) => {
    const files = Array.from(e.target.files);
    const MAX_FILES = 5;
    const remaining = MAX_FILES - f.attachments.length;
    if (remaining <= 0) { alert("Maximum 5 attachments allowed."); return; }
    const toAdd = files.slice(0, remaining);
    const loaded = await Promise.all(toAdd.map(readFileAsDataURL));
    set("attachments", [...f.attachments, ...loaded]);
    e.target.value = "";
  };

  const removeAttachment = (i) => {
    set("attachments", f.attachments.filter((_,idx) => idx !== i));
  };

  const labelStyle = {fontFamily:"'Geist Mono',monospace",fontSize:11,color:"var(--mut)",textTransform:"uppercase",letterSpacing:.5,marginBottom:6};
  const inputStyle = {width:"100%",padding:"10px 12px",border:"1px solid var(--line2)",borderRadius:"var(--radius)",marginBottom:14,color:"var(--ink)",background:"var(--bg)"};

  return (
    <Overlay onClose={onClose}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
        <div>
          <div style={{fontSize:18,fontWeight:600}}>New ticket</div>
          <div style={{fontSize:13,color:"var(--mut)",marginTop:4}}>No account needed.</div>
        </div>
        <Btn variant="ghost" size="xs" onClick={onClose} style={{fontSize:18}}>×</Btn>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:18}}>
        {[["bug","Bug"],["feature","Feature"]].map(([t,lbl])=>(
          <Btn key={t} variant={f.type===t?"default":"outline"} size="sm" onClick={()=>set("type",t)} style={{flex:1}}>{lbl}</Btn>
        ))}
      </div>
      <div style={labelStyle}>Title</div>
      <input className="focus-ring" value={f.title} onChange={e=>set("title",e.target.value)} style={inputStyle}/>
      <div style={labelStyle}>Description</div>
      <textarea className="focus-ring" value={f.desc} onChange={e=>set("desc",e.target.value)} rows={4} style={{...inputStyle,resize:"vertical"}}/>
      <div style={{display:"flex",gap:12}}>
        <div style={{flex:1}}>
          <div style={labelStyle}>Module</div>
          <select className="focus-ring" value={f.module} onChange={e=>set("module",e.target.value)} style={{...inputStyle,background:"var(--bg)"}}>
            {MODULES.map(m=><option key={m}>{m}</option>)}
          </select>
        </div>
        {isBug && (
          <div style={{flex:1}}>
            <div style={labelStyle}>Severity</div>
            <select className="focus-ring" value={f.severity} onChange={e=>set("severity",e.target.value)} style={{...inputStyle,background:"var(--bg)"}}>
              {Object.entries(SEV).map(([k,v])=><option key={k} value={k}>{v.l}</option>)}
            </select>
          </div>
        )}
      </div>
      <div style={labelStyle}>Your email</div>
      <input className="focus-ring" value={f.email} onChange={e=>set("email",e.target.value)} style={inputStyle}/>

      {/* ---- ATTACHMENTS: multiple screenshots + video ---- */}
      <div style={labelStyle}>Screenshots / Video <span style={{color:"var(--ring)",textTransform:"none",fontSize:10}}>(up to 5 files)</span></div>
      <input className="focus-ring" type="file" accept="image/*,video/*" multiple onChange={handleFiles}
        style={{fontSize:13,marginBottom:6}} disabled={f.attachments.length >= 5}/>
      {f.attachments.length > 0 && (
        <div className="attachment-grid" style={{marginBottom:12}}>
          {f.attachments.map((att, i) => (
            <AttachmentThumbnail key={i} att={att} onRemove={() => removeAttachment(i)} />
          ))}
        </div>
      )}
      {f.attachments.length >= 5 && (
        <div style={{fontSize:12,color:"var(--mut)",marginBottom:12}}>Maximum attachments reached.</div>
      )}

      <Btn disabled={!ok} onClick={()=>onSubmit({...f,severity:isBug?f.severity:"medium"})}
        style={{width:"100%",marginTop:8,opacity:ok?1:.5}}>Submit ticket</Btn>
    </Overlay>
  );
}

/* ------------------------------------------------------------------ *
 *  REPORTER VIEW  (public, no login)
 * ------------------------------------------------------------------ */

  const active = bugs.filter(b=>b.status!=="closed");
  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",padding:"40px 16px"}}>
      <div style={{width:"100%",maxWidth:1180}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:32}}>
          <div style={{width:36,height:36,borderRadius:"var(--radius)",background:"var(--primary)",color:"var(--primary-fg)",
            display:"grid",placeItems:"center",fontWeight:700,fontSize:16}}>S</div>
          <div>
            <div style={{fontSize:18,fontWeight:600}}>SyncUp Bug Portal</div>
            <div className="mono" style={{fontSize:11,color:"var(--mut)"}}>Report issues and track their status</div>
          </div>
          <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}}>
            <ThemeToggle/>
            <Btn size="sm" variant="outline" onClick={()=>document.getElementById("staff-login-trigger").click()}>Staff login</Btn>
          </div>
        </div>
        <Btn onClick={onNewTicket} style={{marginBottom:24,width:"100%",padding:"12px"}}>+ Report a bug or request a feature</Btn>
        <div style={{fontSize:13,fontWeight:600,marginBottom:12,color:"var(--ink-soft)"}}>{active.length} open ticket{active.length!==1?"s":""}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(340px,1fr))",gap:10}}>
        {active.map(b=>(
          <Card key={b.id} style={{padding:"14px 18px",display:"flex",alignItems:"flex-start",gap:12}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                <span className="mono" style={{fontSize:11,color:"var(--mut)"}}>{b.id}</span>
                <StatusBadge s={b.status}/>
                {b.type==="bug" && <Badge style={{background:`${SEV[b.severity]?.c}22`,color:SEV[b.severity]?.c}}>{SEV[b.severity]?.l||b.severity}</Badge>}
              </div>
              <div style={{fontSize:14,fontWeight:500}}>{b.title}</div>
              <div style={{fontSize:12,color:"var(--mut)",marginTop:2}}>{b.module} · {b.created}</div>
            </div>
          </Card>
        ))}
        </div>
      </div>
    </div>
  );
}

/* ------------------------------------------------------------------ *
 *  TICKET ROW  (staff view)
 * ------------------------------------------------------------------ */
function TicketRow({b,me,onAct,onDelete,onComment,expanded,onToggle}){
  const overdue = b.due && b.status!=="resolved" && b.status!=="closed" && new Date(b.due) < new Date();
  const can = ROLES[me.role].can;
  const isTester = me.role === "tester"; // Change 3
  // Parse attachments (new multi-attachment format or legacy single shot)
  const attachments = b.attachments
    ? safeParse(b.attachments, [])
    : (b.shot ? [{ data: b.shot, name: "screenshot", type: "image/png" }] : []);
  const comments = safeParse(b.comments, []); // Change 4

  return (
    <>
      <tr onClick={onToggle} style={{cursor:"pointer"}}>
        <td><span className="mono" style={{fontSize:12,color:"var(--mut)"}}>{b.id}</span></td>
        <td><StatusBadge s={b.status}/></td>
        <td>
          <div style={{fontWeight:500,fontSize:14}}>{b.title}</div>
          {/* Change 3: testers don't see who it's assigned to */}
          {!isTester && b.assignee && b.assignee!=="—" && <div style={{fontSize:11,color:"var(--mut)",marginTop:2}}>{b.assignee}{overdue&&<span style={{color:"var(--destructive)",marginLeft:6}}>overdue</span>}</div>}
        </td>
        {/* Change 6: module column centred */}
        <td style={{textAlign:"center"}}><Badge variant="outline">{b.module}</Badge></td>
        <td>{b.type==="bug"&&<Badge style={{background:`${SEV[b.severity]?.c}22`,color:SEV[b.severity]?.c}}>{SEV[b.severity]?.l}</Badge>}</td>
        <td style={{textAlign:"right"}}><span style={{color:"var(--mut)",fontSize:16}}>{expanded?"▲":"▼"}</span></td>
      </tr>
      {expanded && (
        <tr>
          <td colSpan={6} style={{background:"var(--bg2)",padding:"16px 20px"}}>
            <div style={{fontSize:12,color:"var(--mut)",marginBottom:8}}>
              Reported by {b.reporter} · {b.created}{!isTester && b.due && ` · Due ${b.due}`}
            </div>
            <p style={{fontSize:14,lineHeight:1.6,color:"var(--ink)",marginBottom:attachments.length?12:0,maxWidth:680}}>{b.desc}</p>
            <AttachmentViewer attachments={attachments}/>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:16}}>
              {can.includes("verify")&&b.status==="reported"&&<Btn variant="outline" size="xs" onClick={e=>{e.stopPropagation();onAct(b.id,{status:"verified"});}}>Verify</Btn>}
              {can.includes("assign")&&b.status==="verified"&&<Btn variant="outline" size="xs" onClick={e=>{e.stopPropagation();const who=prompt("Assign to developer (name):"); if(who){const dd=new Date();dd.setDate(dd.getDate()+7);const due=prompt("Timeline / due date (YYYY-MM-DD):",dd.toISOString().slice(0,10)); onAct(b.id,{status:"assigned",assignee:"dev:"+who,due:due||""}); }}}>Assign</Btn>}
              {can.includes("progress")&&b.status==="assigned"&&<Btn variant="outline" size="xs" onClick={e=>{e.stopPropagation();onAct(b.id,{status:"in_progress"});}}>Start</Btn>}
              {can.includes("resolve")&&b.status==="in_progress"&&<Btn variant="outline" size="xs" onClick={e=>{e.stopPropagation();onAct(b.id,{status:"resolved"});}}>Resolve</Btn>}
              {/* Change 8: tester verifies the dev's fix — confirm or reject */}
              {can.includes("close")&&b.status==="resolved"&&<Btn variant="outline" size="xs" onClick={e=>{e.stopPropagation();onAct(b.id,{status:"closed"});}}>Confirm fixed</Btn>}
              {can.includes("reopen")&&b.status==="resolved"&&<Btn variant="outline" size="xs" onClick={e=>{e.stopPropagation();onAct(b.id,{status:"in_progress"});}}>Not fixed — reopen</Btn>}
              {can.includes("reopen")&&b.status==="closed"&&<Btn variant="outline" size="xs" onClick={e=>{e.stopPropagation();onAct(b.id,{status:"reported"});}}>Reopen</Btn>}
              {can.includes("delete")&&<Btn variant="destructive" size="xs" onClick={e=>{e.stopPropagation();if(confirm("Delete "+b.id+"?"))onDelete(b.id);}}>Delete</Btn>}
            </div>

            {/* Change 4: comments */}
            <div style={{marginTop:16,borderTop:"1px solid var(--line)",paddingTop:12}}>
              <div className="mono" style={{fontSize:11,color:"var(--mut)",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Comments</div>
              {comments.length===0 && <div style={{fontSize:13,color:"var(--mut)",marginBottom:4}}>No comments yet.</div>}
              {comments.map((c,i)=>(
                <div key={i} style={{marginBottom:10}}>
                  <div style={{fontSize:12}}>
                    <span style={{fontWeight:600}}>{c.author}</span>
                    <span className="mono" style={{color:"var(--mut)",marginLeft:6,fontSize:10,textTransform:"uppercase"}}>{ROLES[c.role]?.label||c.role}</span>
                    <span style={{color:"var(--mut)",marginLeft:6,fontSize:11}}>{c.created}</span>
                  </div>
                  <div style={{fontSize:13,color:"var(--ink)",marginTop:2,whiteSpace:"pre-wrap"}}>{c.body}</div>
                </div>
              ))}
              <CommentBox onAdd={(text)=>onComment(b.id,text)}/>
            </div>
          </td>
        </tr>
      )}
    </>
  );
}

/* ------------------------------------------------------------------ *
 *  APP ROOT
 * ------------------------------------------------------------------ */
function App(){
  const [bugs,setBugs]=useState([]);
  const [me,setMe]=useState(null);
  const [showForm,setShowForm]=useState(false);
  const [showLogin,setShowLogin]=useState(false);
  const [filter,setFilter]=useState("all");
  const [q,setQ]=useState("");
  const [toast,setToast]=useState(null);
  const [openId,setOpenId]=useState(null);

  /* ---- SESSION PERSISTENCE FIX ---- */
  useEffect(()=>{
    try {
      const saved = sessionStorage.getItem(SESSION_KEY);
      if (saved) setMe(JSON.parse(saved));
    } catch(e) {}
    load();
  },[]);

  const login = (u) => {
    setMe(u);
    setShowLogin(false);
    try { sessionStorage.setItem(SESSION_KEY, JSON.stringify(u)); } catch(e) {}
  };

  const logout = () => {
    setMe(null);
    try { sessionStorage.removeItem(SESSION_KEY); } catch(e) {}
  };

  const load=async()=>setBugs(await api.list());

  // Change 2: switching queue/tab collapses any open detail
  const selectFilter = (key) => { setFilter(key); setOpenId(null); };

  const submit=async(f)=>{
    const prefix = f.type==="feature"?"FEAT-":"BUG-";
    const n = 1045 + bugs.filter(b=>b.id.startsWith(prefix)).length;
    const b={ id:prefix+n, type:f.type, title:f.title.trim(), desc:f.desc.trim(),
      module:f.module, severity:f.severity, status:"reported", reporter:"guest:"+f.email.trim(),
      assignee:"—", due:"", created:new Date().toISOString().slice(0,10),
      // Store all attachments as JSON string; keep shot for backwards compatibility
      shot: f.attachments.length ? f.attachments[0].data : null,
      attachments: JSON.stringify(f.attachments),
      comments: "[]",
    };
    await api.add(b); await load(); setShowForm(false);
    setToast("Ticket submitted — we'll email "+f.email.trim()+" on resolution.");
    setTimeout(()=>setToast(null),4200);
  };

  const act = async (id, patch) => {
    await api.update(id, patch);
    await load();
    if (patch.status) {
      setToast("Updated " + id + " → " + STATUS[patch.status].label);
      setTimeout(() => setToast(null), 2600);
    }
    if(patch.status === "resolved") {
      const targetBug = bugs.find(b => b.id === id);
      const reporterEmail = targetBug.reporter.replace("guest:", "");
      await fetch("https://anuupbdmcqralxskdyur.supabase.co/functions/v1/notify-resolved-md", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: reporterEmail, reportId: targetBug.id, title: targetBug.title }),
      });
    }
  };

  // Change 4: append a comment to a ticket
  const comment = async (id, body) => {
    const target = bugs.find(b => b.id === id);
    if (!target) return;
    const existing = safeParse(target.comments, []);
    const next = [...existing, {
      author: me.name,
      role: me.role,
      body,
      created: new Date().toISOString().slice(0,16).replace("T"," "),
    }];
    await api.update(id, { comments: JSON.stringify(next) });
    await load();
  };

  const del = async (id) => { await api.remove(id); await load();
    setToast("Deleted "+id); setTimeout(()=>setToast(null),2400); };
  const clearAll = async () => { if(!confirm("Delete ALL tickets permanently?")) return;
    await api.clear(); await load(); setToast("All tickets cleared"); setTimeout(()=>setToast(null),2600); };

  /* --- Reporter (not logged in) --- */
  if(!me){
    return (
      <>
        <ReporterView bugs={bugs} onNewTicket={()=>setShowForm(true)}/>
        <button id="staff-login-trigger" style={{display:"none"}} onClick={()=>setShowLogin(true)}/>
        {showLogin && <StaffLoginModal onLogin={login} onClose={()=>setShowLogin(false)}/>}
        {showForm && <TicketFormModal onSubmit={submit} onClose={()=>setShowForm(false)}/>}
        {toast && <Toast msg={toast}/>}
      </>
    );
  }

  /* --- Staff (logged in) --- */
  const counts = FLOW.reduce((a,s)=>{a[s]=bugs.filter(b=>b.status===s).length;return a;},{});
  const openCount = bugs.filter(b=>b.status!=="resolved"&&b.status!=="closed").length;
  let shown = bugs.filter(b=>{
    const mf = filter==="all"||b.status===filter;
    const mq = !q || (b.title+b.desc+b.id+b.module).toLowerCase().includes(q.toLowerCase());
    return mf&&mq;
  });

  // Change 5: admin "All tickets" tab follows resolved → verified → in progress → assigned order
  if (filter==="all" && me.role==="admin") {
    shown = [...shown].sort((a,b)=>{
      const ra = ADMIN_ALL_ORDER.indexOf(a.status);
      const rb = ADMIN_ALL_ORDER.indexOf(b.status);
      const na = ra===-1 ? ADMIN_ALL_ORDER.length : ra;
      const nb = rb===-1 ? ADMIN_ALL_ORDER.length : rb;
      return na-nb;
    });
  }

  return (
    <div style={{display:"flex",minHeight:"100vh"}}>
      {/* SIDEBAR */}
      <aside style={{width:240,background:"var(--bg2)",borderRight:"1px solid var(--line)",
        padding:"20px 14px",display:"flex",flexDirection:"column",gap:4,position:"sticky",top:0,height:"100vh"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"0 6px 16px"}}>
          <div style={{width:32,height:32,borderRadius:"var(--radius)",background:"var(--primary)",color:"var(--primary-fg)",
            display:"grid",placeItems:"center",fontWeight:700,fontSize:15}}>S</div>
          <div style={{lineHeight:1.2}}>
            <div style={{fontSize:15,fontWeight:600}}>Ticket Desk</div>
            <div className="mono" style={{fontSize:10,color:"var(--mut)",letterSpacing:.3}}>SyncUp</div>
          </div>
        </div>

        <Btn onClick={()=>setShowForm(true)} style={{marginBottom:12,width:"100%"}}>+ New ticket</Btn>

        <div className="mono" style={{fontSize:10,color:"var(--mut)",letterSpacing:.8,padding:"0 8px 4px",textTransform:"uppercase"}}>Queues</div>
        {[{key:"all",label:"All tickets",n:bugs.length},...FLOW.map(s=>({key:s,label:STATUS[s].label,n:counts[s]}))].map(item=>(
          <button key={item.key} className="focus-ring" onClick={()=>selectFilter(item.key)}
            style={{display:"flex",alignItems:"center",width:"100%",padding:"8px 12px",borderRadius:"var(--radius)",
            background:filter===item.key?"var(--accent)":"transparent",
            color:filter===item.key?"var(--ink)":"var(--ink-soft)",fontWeight:filter===item.key?600:400,fontSize:13,textAlign:"left"}}>
            <span style={{flex:1}}>{item.label}</span>
            <span className="mono" style={{fontSize:11,color:"var(--mut)"}}>{item.n}</span>
          </button>
        ))}

        <div style={{marginTop:"auto",padding:"14px 10px 4px",borderTop:"1px solid var(--line)"}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"var(--ink-soft)",marginBottom:4}}>
            <span>Open</span><span className="mono" style={{fontWeight:600}}>{openCount}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"var(--ink-soft)"}}>
            <span>Resolved</span><span className="mono" style={{fontWeight:600}}>{counts.resolved+counts.closed}</span>
          </div>
        </div>
      </aside>

      {/* MAIN */}
      <div style={{flex:1,minWidth:0,display:"flex",flexDirection:"column"}}>
        <header style={{display:"flex",alignItems:"center",gap:12,padding:"12px 24px",borderBottom:"1px solid var(--line)",background:"var(--bg)",position:"sticky",top:0,zIndex:20}}>
          <div style={{position:"relative",flex:1,maxWidth:400}}>
            <input className="focus-ring" value={q} onChange={e=>setQ(e.target.value)}
              placeholder="Search tickets…"
              style={{width:"100%",padding:"8px 12px",border:"1px solid var(--line2)",borderRadius:"var(--radius)",background:"var(--bg)",color:"var(--ink)",fontSize:14}}/>
          </div>
          {me.role==="admin" && bugs.length>0 &&
            <Btn variant="destructive" size="sm" onClick={clearAll}>Clear all</Btn>}
          <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:10}}>
            <ThemeToggle/>
            {/* Change 7: name + role label centred */}
            <div style={{textAlign:"center",lineHeight:1.25}}>
              <div style={{fontSize:13,fontWeight:600}}>{me.name}</div>
              <div className="mono" style={{fontSize:10,color:"var(--mut)",textTransform:"uppercase",letterSpacing:.5}}>{ROLES[me.role].label}</div>
            </div>
            <Btn variant="outline" size="sm" onClick={logout}>Sign out</Btn>
          </div>
        </header>

        <main style={{flex:1,overflow:"auto",padding:"24px"}} className="main-content">
          <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:16}}>
            <h1 style={{fontSize:22,fontWeight:600}}>{filter==="all"?"All tickets":STATUS[filter].label}</h1>
            <span className="mono" style={{fontSize:12,color:"var(--mut)"}}>{shown.length} {shown.length===1?"ticket":"tickets"}</span>
          </div>
          <Card style={{overflowX:"auto"}}>
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Status</th>
                  <th>Title</th>
                  {/* Change 6: module header centred */}
                  <th style={{textAlign:"center"}}>Module</th>
                  <th>Sev</th>
                  <th style={{width:40}}/>
                </tr>
              </thead>
              <tbody>
                {shown.length===0
                  ? <tr><td colSpan={6} style={{textAlign:"center",padding:"40px",color:"var(--mut)"}}>No tickets in this queue.</td></tr>
                  : shown.map(b=>(
                      <TicketRow key={b.id} b={b} me={me} onAct={act} onDelete={del} onComment={comment}
                        expanded={openId===b.id} onToggle={()=>setOpenId(openId===b.id?null:b.id)}/>
                    ))
                }
              </tbody>
            </table>
          </Card>
        </main>
      </div>

      {showForm && <TicketFormModal onSubmit={submit} onClose={()=>setShowForm(false)}/>}
      {toast && <Toast msg={toast}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
